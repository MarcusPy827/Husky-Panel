# ---------------------------------------------------------------
# GitHub Actions — Build Arch Linux package (.pkg.tar.zst)
# ---------------------------------------------------------------

name: Build Arch Package

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:
    branches: [main]

jobs:
  build-arch-pkg:
    name: Arch Linux (.pkg.tar.zst) [${{ matrix.arch }}]
    runs-on: ${{ matrix.runner }}
    container:
      image: ${{ matrix.image }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            image: archlinux:latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
            image: menci/archlinuxarm:base

    steps:
      - name: Disable pacman sandbox (aarch64 only)
        if: matrix.arch == 'aarch64'
        run: sed -i '/^\[options\]/a DisableSandbox' /etc/pacman.conf

      - name: Install base dependencies
        run: |
          pacman -Syu --noconfirm --needed
          pacman -S --noconfirm --needed base-devel git

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Create source tarball from local checkout
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          PKGVER=$(grep -m1 '^pkgver=' packages/PKGBUILD | cut -d= -f2)
          TARBALL="packages/husky-panel-${PKGVER}.tar.gz"
          git archive --format=tar.gz --prefix="Husky-Panel-${PKGVER}/" -o "${TARBALL}" HEAD
          if [[ -f .gitmodules ]]; then
            TMPDIR_SUB="$(mktemp -d)"
            mkdir -p "${TMPDIR_SUB}/Husky-Panel-${PKGVER}"
            tar xzf "${TARBALL}" -C "${TMPDIR_SUB}"
            git submodule foreach --quiet --recursive \
              "git archive --prefix=\"Husky-Panel-${PKGVER}/\${sm_path}/\" HEAD | tar xf - -C \"${TMPDIR_SUB}\""
            tar czf "${TARBALL}" -C "${TMPDIR_SUB}" "Husky-Panel-${PKGVER}"
            rm -rf "${TMPDIR_SUB}"
          fi

      - name: Build package with makepkg
        run: |
          useradd -m builder

          echo 'builder ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/builder
          chmod 0440 /etc/sudoers.d/builder

          chown -R builder:builder "$GITHUB_WORKSPACE"
          runuser -u builder -- bash -lc "cd '$GITHUB_WORKSPACE/packages' && makepkg --syncdeps --cleanbuild --noconfirm"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: husky-panel-arch-pkg-${{ matrix.arch }}
          path: |
            packages/*.pkg.tar.zst
            packages/*.pkg.tar.zst.sig
          if-no-files-found: error
          retention-days: 30
