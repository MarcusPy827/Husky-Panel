# ======================== Arch Build (zstd package) ========================
build:pkg:arch:
  stage: build
  image: archlinux:latest
  tags: []
  before_script:
    - APP_VERSION=$(grep -m1 '^pkgver=' packages/PKGBUILD | cut -d= -f2)
    - |
      if [ "${RUNNER_REGION:-}" = "cn" ]; then
        cat > /etc/pacman.d/mirrorlist <<'EOF'
      Server = https://mirrors.tuna.tsinghua.edu.cn/archlinux/$repo/os/$arch
      Server = https://mirrors.ustc.edu.cn/archlinux/$repo/os/$arch
      EOF
      else
        cat > /etc/pacman.d/mirrorlist <<'EOF'
      Server = https://geo.mirror.pkgbuild.com/$repo/os/$arch
      Server = https://mirrors.kernel.org/archlinux/$repo/os/$arch
      EOF
      fi
    
    - pacman -Syu --noconfirm --needed
    - pacman -S --noconfirm --needed base-devel git

    - useradd -m builder
    - "echo 'builder ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/builder"
    - chmod 0440 /etc/sudoers.d/builder

    # ---- Create source tarball from local checkout (before chown) ----
    - TARBALL="$CI_PROJECT_DIR/packages/${APP_NAME}-${APP_VERSION}.tar.gz"
    - git archive --format=tar.gz --prefix="Husky-Panel-${APP_VERSION}/" -o "${TARBALL}" HEAD
    - |
      if [[ -f .gitmodules ]]; then
        TMPDIR_SUB="$(mktemp -d)"
        mkdir -p "${TMPDIR_SUB}/Husky-Panel-${APP_VERSION}"
        tar xzf "${TARBALL}" -C "${TMPDIR_SUB}"
        git submodule foreach --quiet --recursive \
          "git archive --prefix=\"Husky-Panel-${APP_VERSION}/\${sm_path}/\" HEAD | tar xf - -C \"${TMPDIR_SUB}\""
        tar czf "${TARBALL}" -C "${TMPDIR_SUB}" "Husky-Panel-${APP_VERSION}"
        rm -rf "${TMPDIR_SUB}"
      fi

    - chown -R builder:builder "$CI_PROJECT_DIR"
  script:
    - runuser -u builder -- bash -lc "cd '$CI_PROJECT_DIR/packages' && makepkg --syncdeps --cleanbuild --noconfirm"
    - mkdir -p arch-pkgs
    - find packages -maxdepth 1 -name '*.pkg.tar.zst' -exec cp {} arch-pkgs/ \;
    - find packages -maxdepth 1 -name '*.pkg.tar.zst.sig' -exec cp {} arch-pkgs/ \;
  artifacts:
    name: "${APP_NAME}-${APP_VERSION}-arch-pkg"
    paths:
      - arch-pkgs/
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

build:pkg:arch:aarch64:
