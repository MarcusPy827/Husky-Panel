  image: menci/archlinuxarm:base
  tags: [arm64]
  before_script:
    - APP_VERSION=$(grep -m1 '^pkgver=' packages/PKGBUILD | cut -d= -f2)
    - echo "DisableSandbox" >> /etc/pacman.conf
